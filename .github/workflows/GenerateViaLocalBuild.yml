name: GenerateViaLocalBuild
# This workflow is to be used when we are developing foliage. 
# It builds everything manually and at each commit. 
# in general it is better to use the generate action since it is way faster and using the centralised version.
 
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # I commented the following to make sure that the shared version get executed on push and not this workflow
  push:
    branches: [ "main" ]
    # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: macos-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Build Foliage
        run: |
           git clone https://github.com/pillar-markup/foliage.git
           ./foliage/scripts/build.sh

      - name: Execute Foliage
        run: |
           ./build/foliage --source site --target generated

      - uses: actions/upload-artifact@v5
        with:
            name: foliage-generated
            path: generated

      - name: AddNoJekill
        run: touch generated/.nojekyll

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    # needed by JamesIves/github-pages-deploy-action
    - uses: actions/checkout@v4
    
    - uses: actions/download-artifact@v5
      with:
        path: generated

    - name: debug
      run: ls -R

    - name: deploy
      uses: JamesIves/github-pages-deploy-action@v4.4.1
      with:
        branch: gh_pages # The branch the action should deploy to.
        folder: generated # The folder the action should deploy.
      if: github.event_name != 'pull_request'      

          
